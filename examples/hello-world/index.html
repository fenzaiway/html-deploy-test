<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World — Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f1117, #1a1025);
            color: #e4e4e7;
        }
        .box {
            text-align: center;
            padding: 48px;
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        h1 { font-size: 3rem; margin-bottom: 12px; }
        .wave { display: inline-block; animation: wave 1.5s infinite; transform-origin: 70% 70%; }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-15deg); }
        }
        p { color: #71717a; font-size: 1.1rem; }
        .back {
            display: inline-block; margin-top: 24px; padding: 8px 20px;
            border-radius: 8px; background: rgba(167,139,250,0.15);
            color: #a78bfa; text-decoration: none; font-size: 0.9rem;
        }
        .back:hover { background: rgba(167,139,250,0.25); }
    </style>
</head>
<body>
    <div class="box">
        <h1><span class="wave">👋</span> Hello World</h1>
        <p>部署成功！这是一个基础演示页面。</p>
        <a class="back" href="../../index.html">← 返回导航</a>
    </div>
</body>
</html>
