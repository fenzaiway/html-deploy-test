<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Hub — 演示例子导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #242836;
            --border: #2a2e3a;
            --text: #e4e4e7;
            --text-dim: #71717a;
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 60px 24px; }

        header { text-align: center; margin-bottom: 48px; }
        header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        header p { color: var(--text-dim); font-size: 1.05rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .card {
            display: block;
            text-decoration: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s ease;
            color: inherit;
        }
        .card:hover {
            background: var(--surface-hover);
            border-color: var(--accent);
            box-shadow: 0 0 24px var(--accent-glow);
            transform: translateY(-2px);
        }
        .card-icon {
            font-size: 1.8rem;
            margin-bottom: 12px;
            display: block;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.88rem;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .card-tag {
            display: inline-block;
            margin-top: 12px;
            padding: 3px 10px;
            font-size: 0.72rem;
            border-radius: 999px;
            background: var(--accent-glow);
            color: var(--accent);
            font-weight: 500;
        }

        footer {
            margin-top: 64px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.82rem;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 Demo Hub</h1>
            <p>演示例子导航 — 每个卡片是一个独立的 HTML 演示页面</p>
        </header>

        <div class="grid">
            <!-- 新增例子时，在下方复制一个 <a class="card"> 卡片即可 -->
            <a class="card" href="examples/hello-world/index.html">
                <span class="card-icon">👋</span>
                <div class="card-title">Hello World</div>
                <div class="card-desc">基础模板演示，验证部署是否正常工作</div>
                <span class="card-tag">基础</span>
            </a>

            <a class="card" href="examples/pretext/index.html">
                <span class="card-icon">⚡</span>
                <div class="card-title">Pretext</div>
                <div class="card-desc">纯算术文本布局引擎 — 万级虚拟列表、零重排、实时查表演示</div>
                <span class="card-tag">TypeScript</span>
            </a>
            <a class="card" href="examples/hi-tea-go.html">
                <span class="card-icon">⚡</span>
                <div class="card-title">喜茶</div>
                <div class="card-desc">AI写的模仿喜茶的页面</div>
                <span class="card-tag">HTML</span>
            </a>
        </div>

        <footer>
            html-deploy-test · 新增例子：添加文件到 <code>examples/</code> 目录并更新此导航页
        </footer>
    </div>
</body>
</html>
